apply plugin: 'java-library'

def readLocalProperty(String key) {
    def localPropertiesFile = project.rootProject.file('local.properties')
    if (!localPropertiesFile.exists()) {
        return null
    }
    def properties = new Properties()
    localPropertiesFile.withInputStream { input ->
        properties.load(input)
    }
    return properties.getProperty(key)
}

def customUploadGradlePluginUrl = readLocalProperty("customUploadGradlePluginUrl")
if (customUploadGradlePluginUrl != null && !customUploadGradlePluginUrl.trim().isEmpty()) {
    apply from: customUploadGradlePluginUrl
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    api "com.google.code.gson:gson:2.8.5"
}

sourceCompatibility = "1.8"
targetCompatibility = "1.8"

