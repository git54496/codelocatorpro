<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeLocator Viewer</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #d9e1ee;
      --text: #182133;
      --muted: #607089;
      --accent: #0b84f3;
      --accent-soft: rgba(11,132,243,0.16);
      --left-pane-width: 340px;
      --right-pane-width: 340px;
      --splitter-width: 10px;
    }
    body { margin: 0; background: radial-gradient(circle at 20% -10%, #d7ecff, #f4f7fb 40%); color: var(--text); font-family: "SF Pro Text", "PingFang SC", sans-serif; }
    .top { display:flex; gap:8px; align-items:center; padding:12px 16px; border-bottom:1px solid var(--line); background:var(--panel); position: sticky; top:0; z-index:2; }
    .top input, .top select { border:1px solid var(--line); border-radius:8px; padding:8px 10px; background:#fff; }
    .top button { border:1px solid #1b75d0; background:#0b84f3; color:#fff; border-radius:8px; padding:8px 12px; cursor:pointer; }
    .top .toggle { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); }
    .top .toggle input { margin:0; }
    .layout { display:grid; grid-template-columns: var(--left-pane-width) var(--splitter-width) minmax(320px, 1fr) var(--splitter-width) var(--right-pane-width); gap: 0; padding: 12px; height: calc(100vh - 64px); box-sizing: border-box; }
    .panel { background: var(--panel); border:1px solid var(--line); border-radius:12px; overflow:auto; }
    .left-panel { display:flex; flex-direction:column; overflow:hidden; }
    .panel-toolbar {
      display:flex;
      gap:8px;
      align-items:center;
      padding:10px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, #fbfdff 0%, #f5f9ff 100%);
    }
    .panel-toolbar button {
      border:1px solid #c5d3e7;
      background:#fff;
      color:#28415f;
      border-radius:8px;
      padding:6px 10px;
      cursor:pointer;
      font-size:12px;
      font-weight:600;
    }
    .panel-toolbar button.active {
      border-color:#1b75d0;
      background:#0b84f3;
      color:#fff;
    }
    .panel-toolbar button:disabled {
      cursor:not-allowed;
      opacity:0.5;
    }
    .splitter {
      position: relative;
      cursor: col-resize;
      user-select: none;
      touch-action: none;
    }
    .splitter::before {
      content: "";
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: calc(50% - 1px);
      width: 2px;
      border-radius: 99px;
      background: #c8d4e6;
    }
    .splitter:hover::before { background: #9fb3ce; }
    body.is-resizing { cursor: col-resize; user-select: none; }
    #tree { flex:1; padding: 10px; font-size: 13px; overflow:auto; }
    #tree ul { list-style:none; padding-left:16px; margin:0; width:max-content; min-width:100%; }
    .tree-row { display:flex; align-items:center; gap:6px; padding: 4px 6px; border-radius: 6px; cursor:pointer; white-space: nowrap; width:max-content; min-width:100%; box-sizing:border-box; }
    .tree-row:hover { background:#edf4ff; }
    .tree-row.selected { background: var(--accent-soft); border-left:3px solid var(--accent); }
    .twisty { width:12px; color:var(--muted); user-select:none; text-align:center; cursor:pointer; font-size:11px; }
    .twisty.placeholder { visibility:hidden; cursor:default; }
    .tree-label { white-space:nowrap; }
    #canvasWrap { position:relative; overflow:hidden; background:#e8eef7; display:flex; align-items:center; justify-content:center; }
    #stage { position:relative; flex:none; }
    #screenImg { display:block; user-select:none; -webkit-user-drag:none; }
    #overlay { position:absolute; inset:0; pointer-events:auto; cursor:crosshair; }
    #loadingMask {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(248, 251, 255, 0.72);
      color: #2c3e57;
      font-weight: 600;
      z-index: 3;
      pointer-events: none;
    }
    #loadingMask.show { display: flex; }
    #props { padding:12px; font-size:13px; }
    .muted { color: var(--muted); }
    .props-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
    .props-table th, .props-table td { border: 1px solid var(--line); padding: 6px 8px; text-align: left; vertical-align: top; }
    .props-table th { background: #f3f7ff; color: #3d4f6a; font-weight: 600; }
    .props-key { white-space: nowrap; color: #2c4568; }
    .props-value { word-break: break-word; }
    pre { white-space: pre-wrap; word-break: break-word; background:#f6f8fd; border:1px solid var(--line); border-radius:8px; padding:8px; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      max-width: 360px;
      padding: 10px 12px;
      border-radius: 8px;
      color: #fff;
      background: rgba(22, 38, 61, 0.92);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: rgba(173, 40, 40, 0.94); }
    .toast.success { background: rgba(28, 94, 57, 0.94); }
    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      .splitter { display: none; }
      #tree, #canvasWrap, #props { min-height: 280px; }
    }
  </style>
</head>
<body>
  <div class="top">
    <label>Grab</label>
    <select id="grabSelect"></select>
    <label>Search</label>
    <input id="search" placeholder="memAddr/id/class/text/testTag/nodeId" />
    <label>Mode</label>
    <select id="treeMode">
      <option value="view">View Tree</option>
      <option value="component">Component Tree</option>
      <option value="render">Render Tree</option>
      <option value="semantics">Semantics Tree</option>
    </select>
    <label class="toggle"><input id="frameworkToggle" type="checkbox" />Framework</label>
    <button id="grabBtn">Grab</button>
    <button id="copyBtn">Copy key</button>
    <button id="exportAgentBtn">导出到agent</button>
    <span id="meta" class="muted"></span>
  </div>
  <div class="layout" id="layout">
    <div class="panel left-panel">
      <div class="panel-toolbar">
        <button id="locateBtn" type="button">Locate</button>
        <button id="overviewBtn" type="button">Overview</button>
      </div>
      <div id="tree"></div>
    </div>
    <div class="splitter" id="leftSplitter" title="Drag to resize"></div>
    <div class="panel" id="canvasWrap">
      <div id="loadingMask">Loading...</div>
      <div id="stage">
        <img id="screenImg" alt="screenshot" />
        <canvas id="overlay"></canvas>
      </div>
    </div>
    <div class="splitter" id="rightSplitter" title="Drag to resize"></div>
    <div class="panel" id="props"><div class="muted">Select a view node</div></div>
  </div>
  <div id="toast" class="toast" aria-live="polite"></div>

  <script>
    const state = {
      grabs: [],
      snapshot: null,
      currentGrabId: null,
      selected: null,
      overviewActive: true,
      treeMode: 'view',
      showFrameworkNodes: false,
      scale: 1,
      collapsed: new Set(),
      geomList: [],
      geomByMem: {},
      hitCycle: null,
      compose: {
        componentRoots: [],
        renderRoots: [],
        semanticsRoots: [],
        componentByKey: {},
        renderByKey: {},
        semanticsByKey: {},
        linksBySource: {}
      }
    };
    const treeEl = document.getElementById('tree');
    const propsEl = document.getElementById('props');
    const locateBtn = document.getElementById('locateBtn');
    const overviewBtn = document.getElementById('overviewBtn');
    const layoutEl = document.getElementById('layout');
    const leftSplitterEl = document.getElementById('leftSplitter');
    const rightSplitterEl = document.getElementById('rightSplitter');
    const grabSelect = document.getElementById('grabSelect');
    const searchInput = document.getElementById('search');
    const treeModeSelect = document.getElementById('treeMode');
    const frameworkToggle = document.getElementById('frameworkToggle');
    const img = document.getElementById('screenImg');
    const overlay = document.getElementById('overlay');
    const canvasWrap = document.getElementById('canvasWrap');
    const stageEl = document.getElementById('stage');
    const loadingMask = document.getElementById('loadingMask');
    const grabBtn = document.getElementById('grabBtn');
    const exportAgentBtn = document.getElementById('exportAgentBtn');
    const toastEl = document.getElementById('toast');
    const ctx = overlay.getContext('2d');
    const metaEl = document.getElementById('meta');
    const MIN_SIDE_WIDTH = 220;
    const MIN_CENTER_WIDTH = 320;
    let resizing = null;
    const RAW_FIELD_MAP = {
      a: 'mChildren',
      b: 'mTopOffset',
      c: 'mLeftOffset',
      d: 'mLeft',
      e: 'mRight',
      f: 'mTop',
      g: 'mBottom',
      h: 'mScrollX',
      i: 'mScrollY',
      j: 'mScaleX',
      k: 'mScaleY',
      l: 'mTranslationX',
      m: 'mTranslationY',
      n: 'mDrawTop',
      o: 'mDrawBottom',
      p: 'mDrawLeft',
      q: 'mDrawRight',
      r: 'mPaddingTop',
      s: 'mPaddingBottom',
      t: 'mPaddingLeft',
      u: 'mPaddingRight',
      v: 'mMarginTop',
      w: 'mMarginBottom',
      x: 'mMarginLeft',
      y: 'mMarginRight',
      z: 'mLayoutWidth',
      a0: 'mLayoutHeight',
      a1: 'mIsClickable',
      a2: 'mIsLongClickable',
      a3: 'mIsFocusable',
      a4: 'mIsPressed',
      a5: 'mIsSelected',
      a6: 'mIsFocused',
      a7: 'mIsEnabled',
      a8: 'mFlags',
      a9: 'mCanProviderData',
      aa: 'mType',
      ab: 'mVisibility',
      ac: 'mIdStr',
      ad: 'mId',
      ae: 'mAlpha',
      af: 'mMemAddr',
      ag: 'mClassName',
      ah: 'mClickTag',
      ai: 'mTouchTag',
      aj: 'mFindViewByIdTag',
      ak: 'mXmlTag',
      al: 'mDrawableTag',
      am: 'mScaleType',
      an: 'mViewHolderTag',
      ao: 'mAdapterTag',
      ap: 'mBackgroundColor',
      aq: 'mText',
      ar: 'mSpan',
      as: 'mTextColor',
      at: 'mTextSize',
      au: 'mSpacingAdd',
      av: 'mLineHeight',
      aw: 'mTextAlignment',
      ax: 'mZIndex',
      ay: 'mXmlJumpInfo',
      az: 'mImagePath',
      b0: 'mExtraInfos',
      b1: 'mShadowDx',
      b2: 'mShadowDy',
      b3: 'mShadowRadius',
      b4: 'mShadowColor',
      b5: 'mComposeNodes',
      b6: 'mComposeCapture',
      df: 'mPivotX',
      dg: 'mPivotY',
      dk: 'mSlopBoundLeft',
      dl: 'mSlopBoundRight',
      dm: 'mSlopBoundUp',
      dn: 'mSlopBoundBottom',
      do: 'mLayoutRequested'
    };

    async function boot() {
      const res = await fetch('/api/grabs');
      state.grabs = await res.json();
      renderGrabOptions();
      const queryGrab = new URLSearchParams(location.search).get('grab_id');
      const first = queryGrab || (state.grabs[0] && state.grabs[0].grabId);
      if (first) await loadGrab(first);
    }

    function renderGrabOptions() {
      grabSelect.innerHTML = state.grabs.map(g => `<option value="${g.grabId}">${g.grabId}</option>`).join('');
      grabSelect.onchange = () => loadGrab(grabSelect.value);
    }

    async function loadGrab(grabId) {
      setLoading(true);
      grabSelect.value = grabId;
      state.currentGrabId = grabId;
      const snapRes = await fetch(`/api/grab/${grabId}/snapshot`);
      state.snapshot = await snapRes.json();
      state.selected = null;
      state.overviewActive = true;
      state.collapsed = new Set();
      state.hitCycle = null;
      buildGeometryIndex();
      buildComposeState();
      state.treeMode = state.compose.componentRoots.length ? 'component' : 'view';
      treeModeSelect.value = state.treeMode;
      frameworkToggle.checked = state.showFrameworkNodes;
      frameworkToggle.disabled = !state.compose.componentRoots.length;
      const activityStack = state.snapshot.activityStack || [];
      const fragmentSummary = summarizeFragments(activityStack);
      metaEl.textContent = `${state.snapshot.meta.source} | ${state.snapshot.meta.packageName || '-'} | ${state.snapshot.meta.activity || '-'} | activities=${activityStack.length} covered=${activityStack.filter(a => a.covered).length} fragments=${fragmentSummary.total} visible=${fragmentSummary.visible} coveredFragments=${fragmentSummary.covered} | components=${Object.keys(state.compose.componentByKey).length} render=${Object.keys(state.compose.renderByKey).length} semantics=${Object.keys(state.compose.semanticsByKey).length}`;
      img.onload = () => {
        fitImageToViewport();
        redraw();
        setLoading(false);
      };
      img.onerror = () => {
        img.removeAttribute('src');
        stageEl.style.width = '0px';
        stageEl.style.height = '0px';
        overlay.width = 0;
        overlay.height = 0;
        ctx.clearRect(0, 0, 1, 1);
        setLoading(false);
      };
      img.src = `/api/grab/${grabId}/screenshot?_=${Date.now()}`;
      renderTree();
      renderProps();
    }

    function flatten(nodes, out = []) {
      nodes.forEach((n) => {
        out.push(n);
        flatten(n.children || [], out);
      });
      return out;
    }

    function flattenCompose(nodes, out = [], depth = 0) {
      (nodes || []).forEach((n) => {
        out.push({ node: n, depth });
        flattenCompose(n.children || [], out, depth + 1);
      });
      return out;
    }

    function countComposeNodes(nodes) {
      return flattenCompose(nodes || []).length;
    }

    function hasComposeMatch(viewNode, query) {
      if (!query) return false;
      const flat = flattenCompose(viewNode.composeNodes || []);
      return flat.some(({ node }) => {
        return (node.nodeId || '').toLowerCase().includes(query)
          || (node.text || '').toLowerCase().includes(query)
          || (node.testTag || '').toLowerCase().includes(query)
          || (node.contentDescription || '').toLowerCase().includes(query);
      });
    }

    function buildGeometryIndex() {
      const list = [];
      const byMem = {};
      let order = 0;

      function walk(nodes, parentAbsLeft, parentAbsTop, depth) {
        nodes.forEach((n) => {
          const left = Number(n.left || 0);
          const top = Number(n.top || 0);
          const width = Number(n.width || 0);
          const height = Number(n.height || 0);
          const absLeft = parentAbsLeft + left;
          const absTop = parentAbsTop + top;
          const geom = {
            memAddr: n.memAddr,
            absLeft,
            absTop,
            width,
            height,
            depth,
            order: order++,
            visible: n.visible !== false,
            alpha: Number(n.alpha == null ? 1 : n.alpha)
          };
          list.push(geom);
          if (n.memAddr) byMem[n.memAddr] = geom;
          walk(n.children || [], absLeft, absTop, depth + 1);
        });
      }

      walk(state.snapshot.uiTree || [], 0, 0, 0);
      state.geomList = list;
      state.geomByMem = byMem;
    }

    function buildComposeState() {
      const compose = {
        componentRoots: [],
        renderRoots: [],
        semanticsRoots: [],
        componentByKey: {},
        renderByKey: {},
        semanticsByKey: {},
        linksBySource: {}
      };

      function composeKey(hostMemAddr, type, id) {
        if (!hostMemAddr || !type || !id) return '';
        if (type === 'component') return `${hostMemAddr}:component:${id}`;
        if (type === 'render') return `${hostMemAddr}:render:${id}`;
        if (type === 'semantics') return `${hostMemAddr}:semantics:${id}`;
        return `${hostMemAddr}:${type}:${id}`;
      }

      function wrapComponent(node, hostMemAddr, parentKey = null) {
        const key = composeKey(hostMemAddr, 'component', node.componentId);
        const wrapped = {
          ...node,
          kind: 'component',
          key,
          hostMemAddr,
          parentKey,
          children: (node.children || []).map(child => wrapComponent(child, hostMemAddr, key))
        };
        compose.componentByKey[key] = wrapped;
        return wrapped;
      }

      function wrapRender(node, hostMemAddr, parentKey = null) {
        const key = composeKey(hostMemAddr, 'render', node.renderId);
        const wrapped = {
          ...node,
          kind: 'render',
          key,
          hostMemAddr,
          parentKey: node.parentRenderId ? composeKey(hostMemAddr, 'render', node.parentRenderId) : parentKey,
          children: (node.children || []).map(child => wrapRender(child, hostMemAddr, key))
        };
        compose.renderByKey[key] = wrapped;
        return wrapped;
      }

      function wrapSemantics(node, hostMemAddr, parentKey = null) {
        const key = composeKey(hostMemAddr, 'semantics', node.semanticsId);
        const wrapped = {
          ...node,
          kind: 'semantics',
          key,
          hostMemAddr,
          parentKey,
          children: (node.children || []).map(child => wrapSemantics(child, hostMemAddr, key))
        };
        compose.semanticsByKey[key] = wrapped;
        return wrapped;
      }

      function registerLinks(hostMemAddr, links) {
        (links || []).forEach((link) => {
          const sourceKey = composeKey(hostMemAddr, link.sourceNodeType, link.sourceId);
          const targetKey = composeKey(hostMemAddr, link.targetNodeType, link.targetId);
          if (!sourceKey || !targetKey) return;
          if (!compose.linksBySource[sourceKey]) compose.linksBySource[sourceKey] = [];
          compose.linksBySource[sourceKey].push({ ...link, sourceKey, targetKey, hostMemAddr });
        });
      }

      flatten(state.snapshot.uiTree || []).forEach((viewNode) => {
        const capture = viewNode.composeCapture;
        if (!capture) return;
        (capture.componentTree || []).forEach((node) => compose.componentRoots.push(wrapComponent(node, viewNode.memAddr)));
        (capture.renderTree || []).forEach((node) => compose.renderRoots.push(wrapRender(node, viewNode.memAddr)));
        (capture.semanticsTree || []).forEach((node) => compose.semanticsRoots.push(wrapSemantics(node, viewNode.memAddr)));
        registerLinks(viewNode.memAddr, capture.links || []);
      });

      state.compose = compose;
    }

    function fitImageToViewport() {
      if (!img.naturalWidth || !img.naturalHeight) return;
      const w = canvasWrap.clientWidth;
      const h = canvasWrap.clientHeight;
      if (w <= 0 || h <= 0) return;

      const scale = Math.min(w / img.naturalWidth, h / img.naturalHeight);
      const renderW = Math.max(1, Math.floor(img.naturalWidth * scale));
      const renderH = Math.max(1, Math.floor(img.naturalHeight * scale));

      state.scale = scale;
      stageEl.style.width = `${renderW}px`;
      stageEl.style.height = `${renderH}px`;
      img.style.width = `${renderW}px`;
      img.style.height = `${renderH}px`;
      overlay.width = renderW;
      overlay.height = renderH;
    }

    function getVisibleComponentRoots() {
      function project(nodes) {
        const out = [];
        (nodes || []).forEach((node) => {
          const projectedChildren = project(node.children || []);
          if (state.showFrameworkNodes || !node.frameworkNode) {
            out.push({ ...node, children: projectedChildren });
          } else {
            out.push(...projectedChildren);
          }
        });
        return out;
      }
      return project(state.compose.componentRoots || []);
    }

    function getCurrentRoots() {
      if (!state.snapshot) return [];
      if (state.treeMode === 'component') return getVisibleComponentRoots();
      if (state.treeMode === 'render') return state.compose.renderRoots || [];
      if (state.treeMode === 'semantics') return state.compose.semanticsRoots || [];
      return state.snapshot.uiTree || [];
    }

    function getNodeKey(node) {
      return state.treeMode === 'view' ? node.memAddr : node.key;
    }

    function getNodeChildren(node) {
      return node.children || [];
    }

    function getSelectedKey() {
      return state.selected ? state.selected.key : null;
    }

    function treeNodeLabel(node) {
      if (state.treeMode === 'view') {
        const idLabel = node.idStr ? `  id=${node.idStr}` : '';
        const composeCount = countComposeNodes(node.composeNodes || []);
        const composeLabel = composeCount > 0 ? `  compose=${composeCount}` : '';
        return `${node.className}  ${node.memAddr}${idLabel}${node.text ? '  ' + node.text : ''}${composeLabel}`;
      }
      if (state.treeMode === 'component') {
        const fileLabel = node.sourcePath ? `  ${node.sourcePath}${node.sourceLine ? ':' + node.sourceLine : ''}` : '';
        const fwLabel = node.frameworkNode ? '  [framework]' : '';
        return `${node.displayName || node.componentId}  ${node.componentId}${fileLabel}${fwLabel}`;
      }
      if (state.treeMode === 'render') {
        const label = node.typeName || node.renderId;
        return `${label}  (${node.left}, ${node.top}, ${node.right}, ${node.bottom})${node.componentId ? '  component=' + node.componentId : ''}`;
      }
      const semLabel = node.className || node.role || node.semanticsId;
      return `${semLabel}  ${node.text || node.testTag || node.contentDescription || ''}${node.componentId ? '  component=' + node.componentId : ''}`;
    }

    function matchesNode(node, query) {
      if (!query) return true;
      if (state.treeMode === 'view') {
        return (node.memAddr || '').toLowerCase().includes(query)
          || (node.idStr || '').toLowerCase().includes(query)
          || (node.className || '').toLowerCase().includes(query)
          || (node.text || '').toLowerCase().includes(query)
          || hasComposeMatch(node, query);
      }
      if (state.treeMode === 'component') {
        return (node.componentId || '').toLowerCase().includes(query)
          || (node.displayName || '').toLowerCase().includes(query)
          || (node.sourcePath || '').toLowerCase().includes(query)
          || (node.sourcePathToken || '').toLowerCase().includes(query);
      }
      if (state.treeMode === 'render') {
        return (node.renderId || '').toLowerCase().includes(query)
          || (node.typeName || '').toLowerCase().includes(query)
          || (node.componentId || '').toLowerCase().includes(query)
          || (node.modifierSummary || '').toLowerCase().includes(query)
          || (node.styleSummary || '').toLowerCase().includes(query);
      }
      return (node.semanticsId || '').toLowerCase().includes(query)
        || (node.role || '').toLowerCase().includes(query)
        || (node.className || '').toLowerCase().includes(query)
        || (node.legacyNodeId || '').toLowerCase().includes(query)
        || (node.text || '').toLowerCase().includes(query)
        || (node.testTag || '').toLowerCase().includes(query)
        || (node.contentDescription || '').toLowerCase().includes(query);
    }

    function findPath(nodes, targetKey, path = []) {
      for (const node of nodes) {
        const key = state.treeMode === 'view' ? node.memAddr : node.key;
        path.push(key);
        if (key === targetKey) return path.slice();
        const found = findPath(getNodeChildren(node), targetKey, path);
        if (found) return found;
        path.pop();
      }
      return null;
    }

    function renderTree() {
      const q = searchInput.value.trim().toLowerCase();
      const forceExpandForSearch = !!q;
      const roots = getCurrentRoots();

      function nodeHtml(node) {
        const key = getNodeKey(node);
        const selected = getSelectedKey() === key ? 'selected' : '';
        const childrenHtml = getNodeChildren(node).map(nodeHtml).join('');
        if (!matchesNode(node, q) && !childrenHtml) return '';
        const hasChildren = getNodeChildren(node).length > 0;
        const collapsed = !forceExpandForSearch && state.collapsed.has(key);
        const arrow = hasChildren ? (collapsed ? '&#9654;' : '&#9660;') : '';
        const arrowCls = hasChildren ? 'twisty' : 'twisty placeholder';
        return `
          <li>
            <div class="tree-row ${selected}" data-action="select" data-key="${escapeHtml(key)}">
              <span class="${arrowCls}" data-action="toggle" data-key="${escapeHtml(key)}">${arrow}</span>
              <span class="tree-label">${escapeHtml(treeNodeLabel(node))}</span>
            </div>
            ${childrenHtml && !collapsed ? `<ul>${childrenHtml}</ul>` : ''}
          </li>
        `;
      }

      treeEl.innerHTML = `<ul>${roots.map(nodeHtml).join('')}</ul>`;
      updateLeftPanelActions();
    }

    function getSelectedEntity() {
      if (!state.selected) return null;
      if (state.selected.kind === 'view') {
        return flatten(state.snapshot.uiTree || []).find(n => n.memAddr === state.selected.key) || null;
      }
      if (state.selected.kind === 'component') return state.compose.componentByKey[state.selected.key] || null;
      if (state.selected.kind === 'render') return state.compose.renderByKey[state.selected.key] || null;
      if (state.selected.kind === 'semantics') return state.compose.semanticsByKey[state.selected.key] || null;
      return null;
    }

    function updateLeftPanelActions() {
      locateBtn.disabled = !state.selected;
      overviewBtn.classList.toggle('active', !!state.overviewActive);
      overviewBtn.setAttribute('aria-pressed', state.overviewActive ? 'true' : 'false');
    }

    function scrollSelectedTreeRow() {
      if (!state.selected) return;
      requestAnimationFrame(() => {
        let row = treeEl.querySelector(`.tree-row[data-key="${cssAttrEscape(state.selected.key)}"]`);
        if (!row && searchInput.value.trim()) {
          searchInput.value = '';
          renderTree();
          row = treeEl.querySelector(`.tree-row[data-key="${cssAttrEscape(state.selected.key)}"]`);
        }
        if (row) row.scrollIntoView({ block: 'center', inline: 'nearest' });
      });
    }

    function activateOverview() {
      state.selected = null;
      state.overviewActive = true;
      renderTree();
      renderProps();
      redraw();
      updateLeftPanelActions();
    }

    function selectNode(kind, key, scrollIntoView) {
      state.selected = key ? { kind, key } : null;
      state.overviewActive = !state.selected;
      if (state.selected) {
        const path = findPath(getCurrentRoots(), key) || [];
        path.slice(0, -1).forEach((itemKey) => state.collapsed.delete(itemKey));
      }
      renderTree();
      renderProps();
      redraw();
      updateLeftPanelActions();
      if (scrollIntoView && state.selected) {
        scrollSelectedTreeRow();
      }
    }

    function linkedKeys(sourceKey, targetType) {
      const links = state.compose.linksBySource[sourceKey] || [];
      const keys = links
        .filter(link => !targetType || link.targetNodeType === targetType)
        .map(link => link.targetKey);
      return Array.from(new Set(keys));
    }

    function renderProps() {
      const entity = getSelectedEntity();
      if (state.overviewActive || !entity || !state.selected) {
        propsEl.innerHTML = buildGrabOverview();
        return;
      }
      if (state.selected.kind === 'view') {
        const geom = state.geomByMem[entity.memAddr] || null;
        const frameLine = geom
          ? `(${geom.absLeft}, ${geom.absTop}, ${geom.width}, ${geom.height})`
          : `(${entity.left}, ${entity.top}, ${entity.width}, ${entity.height})`;
        const localFrameDiffers = geom
          && (geom.absLeft !== Number(entity.left || 0)
            || geom.absTop !== Number(entity.top || 0)
            || geom.width !== Number(entity.width || 0)
            || geom.height !== Number(entity.height || 0));
        const composeTable = buildComposeTable(entity.composeNodes || []);
        const decodedRows = buildDecodedRawRows(entity.raw);
        const decodedTable = decodedRows.length
          ? `<table class="props-table">
              <thead><tr><th>Raw Key</th><th>Mapped Field</th><th>Value</th></tr></thead>
              <tbody>${decodedRows.map((row) => `<tr><td class="props-key">${escapeHtml(row.key)}</td><td class="props-key">${escapeHtml(row.mapped)}</td><td class="props-value">${escapeHtml(row.value)}</td></tr>`).join('')}</tbody>
            </table>`
          : '<div class="muted">No decoded raw params</div>';
        propsEl.innerHTML = `<h3>${entity.className}</h3>
          <div><b>memAddr:</b> ${entity.memAddr}</div>
          <div><b>id:</b> ${entity.idStr || '-'}</div>
          <div><b>text:</b> ${entity.text || '-'}</div>
          <div><b>frame:</b> ${frameLine}</div>
          ${localFrameDiffers ? `<div><b>localFrame:</b> (${entity.left}, ${entity.top}, ${entity.width}, ${entity.height})</div>` : ''}
          <div><b>alpha:</b> ${entity.alpha}</div>
          <div><b>visible:</b> ${entity.visible}</div>
          <h4>Compose Semantics</h4>
          ${composeTable}
          <h4>Decoded Params</h4>
          ${decodedTable}
          <h4>Raw</h4>
          <pre>${escapeHtml(JSON.stringify(entity.raw || {}, null, 2))}</pre>`;
        return;
      }

      if (state.selected.kind === 'component') {
        const renderKeys = linkedKeys(entity.key, 'render');
        const semanticsKeys = linkedKeys(entity.key, 'semantics');
        propsEl.innerHTML = `<h3>${escapeHtml(entity.displayName || entity.componentId)}</h3>
          <div><b>componentKey:</b> ${escapeHtml(entity.key)}</div>
          <div><b>componentId:</b> ${escapeHtml(entity.componentId || '')}</div>
          <div><b>source:</b> ${escapeHtml(entity.sourcePath || entity.sourcePathToken || '-')} ${entity.sourceLine ? ':' + entity.sourceLine : ''}</div>
          <div><b>confidence:</b> ${Number(entity.confidence || 0).toFixed(2)}</div>
          <div><b>pathResolution:</b> ${escapeHtml(entity.pathResolution || '-')}</div>
          <div><b>frameworkNode:</b> ${entity.frameworkNode ? 'true' : 'false'}</div>
          <h4>Linked Render</h4>${buildSimpleList(renderKeys)}
          <h4>Linked Semantics</h4>${buildSimpleList(semanticsKeys)}
          <h4>Raw</h4><pre>${escapeHtml(JSON.stringify(entity.raw || {}, null, 2))}</pre>`;
        return;
      }

      if (state.selected.kind === 'render') {
        const semanticsKeys = linkedKeys(entity.key, 'semantics');
        const componentKeys = linkedKeys(entity.key, 'component');
        propsEl.innerHTML = `<h3>${escapeHtml(entity.typeName || entity.renderId)}</h3>
          <div><b>renderKey:</b> ${escapeHtml(entity.key)}</div>
          <div><b>renderId:</b> ${escapeHtml(entity.renderId)}</div>
          <div><b>typeName:</b> ${escapeHtml(entity.typeName || '-')}</div>
          <div><b>bounds:</b> (${entity.left}, ${entity.top}, ${entity.right}, ${entity.bottom})</div>
          <div><b>visible:</b> ${entity.visible}</div>
          <div><b>alpha:</b> ${entity.alpha}</div>
          <div><b>zIndex:</b> ${entity.zIndex}</div>
          <div><b>modifierSummary:</b> ${escapeHtml(entity.modifierSummary || '-')}</div>
          <div><b>styleSummary:</b> ${escapeHtml(entity.styleSummary || '-')}</div>
          <div><b>componentId:</b> ${escapeHtml(entity.componentId || '-')}</div>
          <h4>Linked Components</h4>${buildSimpleList(componentKeys)}
          <h4>Linked Semantics</h4>${buildSimpleList(semanticsKeys)}
          <h4>Raw</h4><pre>${escapeHtml(JSON.stringify(entity.raw || {}, null, 2))}</pre>`;
        return;
      }

      const renderKeys = linkedKeys(entity.key, 'render');
      const componentKeys = linkedKeys(entity.key, 'component');
      propsEl.innerHTML = `<h3>${escapeHtml(entity.className || entity.role || entity.semanticsId)}</h3>
        <div><b>semanticsKey:</b> ${escapeHtml(entity.key)}</div>
        <div><b>semanticsId:</b> ${escapeHtml(entity.semanticsId || '')}</div>
        <div><b>role:</b> ${escapeHtml(entity.role || '-')}</div>
        <div><b>className:</b> ${escapeHtml(entity.className || '-')}</div>
        <div><b>legacyNodeId:</b> ${escapeHtml(entity.legacyNodeId || '-')}</div>
        <div><b>text:</b> ${escapeHtml(entity.text || '-')}</div>
        <div><b>testTag:</b> ${escapeHtml(entity.testTag || '-')}</div>
        <div><b>contentDescription:</b> ${escapeHtml(entity.contentDescription || '-')}</div>
        <div><b>bounds:</b> (${entity.left}, ${entity.top}, ${entity.right}, ${entity.bottom})</div>
        <div><b>state:</b> ${escapeHtml(formatComposeState(entity))}</div>
        <div><b>actions:</b> ${escapeHtml((entity.actions || []).join(', ') || '-')}</div>
        <h4>Linked Render</h4>${buildSimpleList(renderKeys)}
        <h4>Linked Components</h4>${buildSimpleList(componentKeys)}
        <h4>Raw</h4><pre>${escapeHtml(JSON.stringify(entity.raw || {}, null, 2))}</pre>`;
    }

    function buildSimpleList(items) {
      if (!items || !items.length) return '<div class="muted">None</div>';
      return `<ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function flattenFragments(nodes, out = []) {
      (nodes || []).forEach((node) => {
        out.push(node);
        flattenFragments(node.children || [], out);
      });
      return out;
    }

    function summarizeFragments(activityStack) {
      const all = [];
      (activityStack || []).forEach((activity) => flattenFragments(activity.fragments || [], all));
      return {
        total: all.length,
        visible: all.filter(fragment => fragment.effectiveVisible).length,
        covered: all.filter(fragment => fragment.coveredByTopActivity).length
      };
    }

    function getActivityStackOrderInfo() {
      return (state.snapshot && state.snapshot.activityStackOrderInfo) || {
        orderingMode: 'current_first_system_record_order',
        topActivityStable: true,
        backgroundActivitiesUnstable: true,
        warning: 'Only the top activity is considered stable. Background activities keep the captured system record order and may be inaccurate.'
      };
    }

    function activityStatusLabel(activity) {
      const tags = [];
      if (activity.current) tags.push('current');
      if (activity.covered) tags.push('covered');
      if (activity.paused) tags.push('paused');
      if (activity.stopped) tags.push('stopped');
      return tags.join(', ') || 'active';
    }

    function activityOrderStabilityLabel(activity, index) {
      const orderStable = activity.orderStable === true || (activity.orderStable == null && index === 0);
      return orderStable ? 'stable-top' : 'unstable-background';
    }

    function fragmentStatusLabel(fragment) {
      const tags = [];
      if (fragment.effectiveVisible) tags.push('showing');
      else if (fragment.coveredByTopActivity) tags.push('covered');
      else tags.push('hidden');
      if (fragment.added) tags.push('added');
      if (fragment.visible) tags.push('visible');
      if (fragment.userVisibleHint) tags.push('userVisibleHint');
      if (!fragment.boundViewVisible) tags.push('viewHidden');
      return tags.join(', ');
    }

    function buildActivityStackTable(activityStack) {
      if (!activityStack || !activityStack.length) {
        return '<div class="muted">No activity stack captured</div>';
      }
      return `<table class="props-table">
        <thead><tr><th>Activity</th><th>memAddr</th><th>Status</th><th>Order</th><th>StartInfo</th><th>Fragments</th></tr></thead>
        <tbody>
          ${activityStack.map((activity, index) => {
            const fragments = flattenFragments(activity.fragments || []);
            return `<tr>
              <td class="props-value">${escapeHtml(activity.className || '')}</td>
              <td class="props-value">${escapeHtml(activity.memAddr || '')}</td>
              <td class="props-value">${escapeHtml(activityStatusLabel(activity))}</td>
              <td class="props-value">${escapeHtml(activityOrderStabilityLabel(activity, index))}</td>
              <td class="props-value">${escapeHtml(activity.startInfo || '-')}</td>
              <td class="props-value">${fragments.length}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
    }

    function buildFragmentTable(activityStack) {
      const rows = [];
      (activityStack || []).forEach((activity) => {
        flattenFragments(activity.fragments || []).forEach((fragment) => {
          rows.push({ activity, fragment });
        });
      });
      if (!rows.length) return '<div class="muted">No fragments captured</div>';
      return `<table class="props-table">
        <thead><tr><th>Activity</th><th>Fragment</th><th>tag/id</th><th>viewMemAddr</th><th>Status</th></tr></thead>
        <tbody>
          ${rows.map(({ activity, fragment }) => `<tr>
            <td class="props-value">${escapeHtml(activity.className || '')}</td>
            <td class="props-value">${escapeHtml(fragment.className || '')}</td>
            <td class="props-value">${escapeHtml(fragment.tag || '-')}${fragment.fragmentId != null ? ` / ${escapeHtml(fragment.fragmentId)}` : ''}</td>
            <td class="props-value">${escapeHtml(fragment.viewMemAddr || '-')}</td>
            <td class="props-value">${escapeHtml(fragmentStatusLabel(fragment))}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }

    function buildGrabOverview() {
      const activityStack = state.snapshot && state.snapshot.activityStack ? state.snapshot.activityStack : [];
      const currentActivity = activityStack.find((activity) => activity.current) || activityStack[0] || null;
      const fragmentSummary = summarizeFragments(activityStack);
      const orderInfo = getActivityStackOrderInfo();
      return `<h3>Grab Overview</h3>
        <div><b>Current page:</b> screenshot and main tree currently show ${escapeHtml((currentActivity && currentActivity.className) || (state.snapshot && state.snapshot.meta && state.snapshot.meta.activity) || '-')}</div>
        <div><b>Covered info:</b> activity stack and fragment rows marked <code>covered</code> were captured from pages hidden behind the current top activity; they are not rendered in the main screenshot/tree.</div>
        <div><b>Activity stack order:</b> ${escapeHtml(orderInfo.orderingMode || 'current_first_system_record_order')}</div>
        <div><b>Order warning:</b> ${escapeHtml(orderInfo.warning || '')}</div>
        <div><b>Fragment summary:</b> total=${fragmentSummary.total}, showing=${fragmentSummary.visible}, covered=${fragmentSummary.covered}</div>
        <h4>Activity Stack</h4>
        ${buildActivityStackTable(activityStack)}
        <h4>Fragments</h4>
        ${buildFragmentTable(activityStack)}`;
    }

    function buildComposeTable(composeNodes) {
      const rows = flattenCompose(composeNodes || []);
      if (!rows.length) return '<div class="muted">No compose semantics nodes</div>';
      return `<div><b>nodeCount:</b> ${rows.length}</div>
        <table class="props-table">
          <thead>
            <tr><th>depth</th><th>nodeId</th><th>text</th><th>testTag</th><th>contentDesc</th><th>bounds</th><th>state</th><th>actions</th></tr>
          </thead>
          <tbody>
            ${rows.map(({ node, depth }) => `<tr>
              <td class="props-key">${depth}</td>
              <td class="props-value">${escapeHtml(node.nodeId || '')}</td>
              <td class="props-value">${escapeHtml(node.text || '')}</td>
              <td class="props-value">${escapeHtml(node.testTag || '')}</td>
              <td class="props-value">${escapeHtml(node.contentDescription || '')}</td>
              <td class="props-value">(${Number(node.left || 0)}, ${Number(node.top || 0)}, ${Number(node.right || 0)}, ${Number(node.bottom || 0)})</td>
              <td class="props-value">${escapeHtml(formatComposeState(node))}</td>
              <td class="props-value">${escapeHtml((node.actions || []).join(', '))}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function formatComposeState(node) {
      const flags = [];
      if (node.clickable) flags.push('clickable');
      if (node.enabled === false) flags.push('disabled');
      if (node.focused) flags.push('focused');
      if (node.visibleToUser === false) flags.push('not-visible');
      if (node.selected) flags.push('selected');
      if (node.checkable) flags.push('checkable');
      if (node.checked) flags.push('checked');
      if (node.focusable) flags.push('focusable');
      return flags.join(', ') || '-';
    }

    function formatRawValue(key, value) {
      if (key === 'a' && Array.isArray(value)) return `[${value.length} children]`;
      if (key === 'ab') {
        const raw = String(value);
        if (raw === 'V' || raw === '0') return 'visible';
        if (raw === 'I' || raw === '4') return 'invisible';
        if (raw === 'G' || raw === '8') return 'gone';
      }
      if (key === 'aa') {
        const typeMap = { 0: 'TYPE_NORMAL', 1: 'TYPE_TEXT', 2: 'TYPE_IMAGE', 3: 'TYPE_LINEAR', 4: 'TYPE_FRAME', 5: 'TYPE_RELATIVE' };
        if (typeof value === 'number' && typeMap[value]) return `${value} (${typeMap[value]})`;
      }
      if (value == null) return '';
      if (typeof value === 'string') return value;
      if (typeof value === 'number' || typeof value === 'boolean') return String(value);
      return JSON.stringify(value);
    }

    function sortRawKeys(keys) {
      return keys.sort((a, b) => {
        const pa = RAW_FIELD_MAP[a] ? 0 : 1;
        const pb = RAW_FIELD_MAP[b] ? 0 : 1;
        if (pa !== pb) return pa - pb;
        if (a.length !== b.length) return a.length - b.length;
        return a.localeCompare(b);
      });
    }

    function buildDecodedRawRows(raw) {
      if (!raw || typeof raw !== 'object') return [];
      const keys = sortRawKeys(Object.keys(raw));
      return keys.map((key) => ({ key, mapped: RAW_FIELD_MAP[key] || '(unknown)', value: formatRawValue(key, raw[key]) }));
    }

    function redraw() {
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      if (!state.selected) return;
      const rects = selectionRects();
      rects.forEach((rect, index) => drawRect(rect, index));
    }

    function selectionRects() {
      const entity = getSelectedEntity();
      if (!entity || !state.selected) return [];
      if (state.selected.kind === 'view') {
        const geom = state.geomByMem[entity.memAddr];
        return geom ? [{ left: geom.absLeft, top: geom.absTop, right: geom.absLeft + geom.width, bottom: geom.absTop + geom.height }] : [];
      }
      if (state.selected.kind === 'render') {
        return [{ left: entity.left, top: entity.top, right: entity.right, bottom: entity.bottom }];
      }
      const renderKeys = state.selected.kind === 'semantics'
        ? Array.from(new Set([...(linkedKeys(entity.key, 'render')), ...(entity.renderId ? [`${entity.hostMemAddr}:render:${entity.renderId}`] : [])]))
        : linkedKeys(entity.key, 'render');
      const rects = renderKeys.map(key => state.compose.renderByKey[key]).filter(Boolean).map(node => ({
        left: Number(node.left || 0),
        top: Number(node.top || 0),
        right: Number(node.right || 0),
        bottom: Number(node.bottom || 0)
      }));
      if (rects.length) return rects;
      const geom = state.geomByMem[entity.hostMemAddr];
      return geom ? [{ left: geom.absLeft, top: geom.absTop, right: geom.absLeft + geom.width, bottom: geom.absTop + geom.height }] : [];
    }

    function drawRect(rect, index) {
      const s = state.scale || 1;
      const x = Number(rect.left || 0) * s;
      const y = Number(rect.top || 0) * s;
      const w = Math.max(0, Number(rect.right || 0) - Number(rect.left || 0)) * s;
      const h = Math.max(0, Number(rect.bottom || 0) - Number(rect.top || 0)) * s;
      const fills = ['rgba(11,132,243,0.18)', 'rgba(255,122,36,0.18)', 'rgba(18,166,93,0.18)'];
      const strokes = ['#0b84f3', '#ff7a24', '#12a65d'];
      ctx.fillStyle = fills[index % fills.length];
      ctx.strokeStyle = strokes[index % strokes.length];
      ctx.lineWidth = 2;
      ctx.fillRect(x, y, w, h);
      ctx.strokeRect(x, y, w, h);
    }

    function hitTestCandidates(clientX, clientY) {
      const rect = overlay.getBoundingClientRect();
      const x = (clientX - rect.left) / (state.scale || 1);
      const y = (clientY - rect.top) / (state.scale || 1);
      const hits = (state.geomList || []).filter((g) => {
        const left = Number(g.absLeft || 0);
        const top = Number(g.absTop || 0);
        const width = Number(g.width || 0);
        const height = Number(g.height || 0);
        const visible = g.visible && Number(g.alpha || 0) > 0;
        return visible && width > 0 && height > 0 && x >= left && y >= top && x <= left + width && y <= top + height;
      });
      hits.sort((a, b) => {
        if (b.depth !== a.depth) return b.depth - a.depth;
        const areaA = Number(a.width || 0) * Number(a.height || 0);
        const areaB = Number(b.width || 0) * Number(b.height || 0);
        if (areaA !== areaB) return areaA - areaB;
        return b.order - a.order;
      });
      return { candidates: hits.map(g => g.memAddr).filter(Boolean), pointKey: `${Math.round(x)}:${Math.round(y)}` };
    }

    function getLayoutVarPx(name, fallback) {
      const raw = getComputedStyle(layoutEl).getPropertyValue(name).trim();
      const value = Number.parseFloat(raw);
      return Number.isFinite(value) ? value : fallback;
    }

    function clamp(v, min, max) {
      return Math.min(Math.max(v, min), max);
    }

    function setPaneWidths(left, right) {
      layoutEl.style.setProperty('--left-pane-width', `${Math.round(left)}px`);
      layoutEl.style.setProperty('--right-pane-width', `${Math.round(right)}px`);
      fitImageToViewport();
      redraw();
    }

    function beginResize(side, clientX) {
      if (window.matchMedia('(max-width: 1100px)').matches) return;
      const rect = layoutEl.getBoundingClientRect();
      resizing = {
        side,
        startX: clientX,
        startLeft: getLayoutVarPx('--left-pane-width', 340),
        startRight: getLayoutVarPx('--right-pane-width', 340),
        layoutWidth: rect.width,
        splitterWidth: getLayoutVarPx('--splitter-width', 10)
      };
      document.body.classList.add('is-resizing');
    }

    function onResizeMove(clientX) {
      if (!resizing) return;
      const delta = clientX - resizing.startX;
      const reserved = resizing.splitterWidth * 2;
      if (resizing.side === 'left') {
        const maxLeft = resizing.layoutWidth - reserved - resizing.startRight - MIN_CENTER_WIDTH;
        const nextLeft = clamp(resizing.startLeft + delta, MIN_SIDE_WIDTH, Math.max(MIN_SIDE_WIDTH, maxLeft));
        setPaneWidths(nextLeft, resizing.startRight);
      } else {
        const maxRight = resizing.layoutWidth - reserved - resizing.startLeft - MIN_CENTER_WIDTH;
        const nextRight = clamp(resizing.startRight - delta, MIN_SIDE_WIDTH, Math.max(MIN_SIDE_WIDTH, maxRight));
        setPaneWidths(resizing.startLeft, nextRight);
      }
    }

    function endResize() {
      if (!resizing) return;
      resizing = null;
      document.body.classList.remove('is-resizing');
    }

    function escapeHtml(str) {
      const text = str == null ? '' : String(str);
      return text.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    function cssAttrEscape(str) {
      return (str || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    treeEl.onclick = (e) => {
      const toggle = e.target.closest('[data-action="toggle"]');
      if (toggle && !toggle.classList.contains('placeholder')) {
        const key = toggle.getAttribute('data-key');
        if (state.collapsed.has(key)) state.collapsed.delete(key);
        else state.collapsed.add(key);
        renderTree();
        return;
      }
      const row = e.target.closest('[data-action="select"]');
      if (row) selectNode(state.treeMode, row.getAttribute('data-key'), false);
    };

    overlay.onclick = (e) => {
      if (!state.snapshot || state.treeMode !== 'view') return;
      const hit = hitTestCandidates(e.clientX, e.clientY);
      const candidates = hit.candidates || [];
      if (!candidates.length) return;
      let idx = 0;
      if (state.hitCycle && state.hitCycle.pointKey === hit.pointKey && arraysEqual(state.hitCycle.candidates, candidates)) {
        idx = (state.hitCycle.index + 1) % candidates.length;
      }
      state.hitCycle = { pointKey: hit.pointKey, candidates, index: idx };
      selectNode('view', candidates[idx], true);
    };

    window.addEventListener('resize', () => {
      fitImageToViewport();
      redraw();
    });

    treeModeSelect.onchange = () => {
      state.treeMode = treeModeSelect.value;
      if (state.selected && state.selected.kind !== state.treeMode) {
        state.selected = null;
        state.overviewActive = true;
      }
      renderTree();
      renderProps();
      redraw();
      updateLeftPanelActions();
    };

    frameworkToggle.onchange = () => {
      state.showFrameworkNodes = frameworkToggle.checked;
      renderTree();
      renderProps();
    };

    searchInput.oninput = () => renderTree();
    locateBtn.onclick = () => {
      if (!state.selected) {
        showToast('No item selected', 'error');
        return;
      }
      selectNode(state.selected.kind, state.selected.key, true);
    };

    overviewBtn.onclick = () => activateOverview();

    grabBtn.onclick = async () => {
      const original = grabBtn.textContent;
      grabBtn.disabled = true;
      grabBtn.textContent = 'Grabbing...';
      try {
        const res = await fetch('/api/grab-live', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        const result = await res.json();
        if (!result.success) {
          const liveMsg = (result.error && result.error.message) || 'grab live failed';
          const fallbackRes = await fetch('/api/grab-file-latest', { method: 'POST' });
          const fallback = await fallbackRes.json();
          if (!fallback.success) {
            const fallbackMsg = (fallback.error && fallback.error.message) || 'grab file fallback failed';
            alert(`Grab live failed: ${liveMsg}\nFallback failed: ${fallbackMsg}`);
            return;
          }
          const fallbackGrabId = fallback.grabId || (fallback.data && fallback.data.grabId);
          const listRes = await fetch('/api/grabs');
          state.grabs = await listRes.json();
          renderGrabOptions();
          if (fallbackGrabId) {
            await loadGrab(fallbackGrabId);
            const u = new URL(location.href);
            u.searchParams.set('grab_id', fallbackGrabId);
            history.replaceState(null, '', u.toString());
          }
          alert(`Grab live failed: ${liveMsg}\nLoaded latest history file instead.`);
          return;
        }
        const newGrabId = result.grabId || (result.data && result.data.grabId);
        const listRes = await fetch('/api/grabs');
        state.grabs = await listRes.json();
        renderGrabOptions();
        if (newGrabId) {
          await loadGrab(newGrabId);
          const u = new URL(location.href);
          u.searchParams.set('grab_id', newGrabId);
          history.replaceState(null, '', u.toString());
        }
      } catch (e) {
        alert(`Grab failed: ${e && e.message ? e.message : e}`);
      } finally {
        grabBtn.disabled = false;
        grabBtn.textContent = original;
      }
    };

    document.getElementById('copyBtn').onclick = async () => {
      if (!state.selected) return;
      const text = state.selected.kind === 'view' ? state.selected.key : state.selected.key;
      await navigator.clipboard.writeText(text);
      showToast('已复制 key。', 'success');
    };

    exportAgentBtn.onclick = async () => {
      if (!state.currentGrabId) {
        showToast('No grab selected', 'error');
        return;
      }
      const original = exportAgentBtn.textContent;
      exportAgentBtn.disabled = true;
      exportAgentBtn.textContent = '导出中...';
      try {
        const res = await fetch(`/api/grab/${encodeURIComponent(state.currentGrabId)}/paths`);
        if (!res.ok) throw new Error(`export paths failed: HTTP ${res.status}`);
        const paths = await res.json();
        const text = buildAgentExportText(paths);
        await navigator.clipboard.writeText(text);
        showToast('已复制导出内容，可直接粘贴给 Agent/LLM。', 'success');
      } catch (e) {
        showToast(`导出失败: ${e && e.message ? e.message : e}`, 'error');
      } finally {
        exportAgentBtn.disabled = false;
        exportAgentBtn.textContent = original;
      }
    };

    function buildAgentExportText(paths) {
      const lines = [
        '[CodeLocator Grab Context]',
        `grab_id: ${paths && paths.grabId ? paths.grabId : (state.currentGrabId || '')}`,
        `screenshot_path: ${paths && paths.screenshotPath ? paths.screenshotPath : ''}`,
        `snapshot_path: ${paths && paths.snapshotPath ? paths.snapshotPath : ''}`,
        `index_path: ${paths && paths.indexPath ? paths.indexPath : ''}`,
        `compose_index_path: ${paths && paths.composeIndexPath ? paths.composeIndexPath : ''}`,
        `component_index_path: ${paths && paths.componentIndexPath ? paths.componentIndexPath : ''}`,
        `render_index_path: ${paths && paths.renderIndexPath ? paths.renderIndexPath : ''}`,
        `semantics_index_path: ${paths && paths.semanticsIndexPath ? paths.semanticsIndexPath : ''}`,
        `link_index_path: ${paths && paths.linkIndexPath ? paths.linkIndexPath : ''}`,
        `grab_dir: ${paths && paths.grabDir ? paths.grabDir : ''}`
      ];
      return lines.join('\n');
    }

    function arraysEqual(a, b) {
      if (!a || !b || a.length !== b.length) return false;
      for (let i = 0; i < a.length; i += 1) if (a[i] !== b[i]) return false;
      return true;
    }

    function setLoading(loading) {
      if (loading) loadingMask.classList.add('show');
      else loadingMask.classList.remove('show');
    }

    let toastTimer = null;
    function showToast(message, type = '') {
      toastEl.textContent = message || '';
      toastEl.className = `toast ${type}`.trim();
      requestAnimationFrame(() => toastEl.classList.add('show'));
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    leftSplitterEl.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      beginResize('left', e.clientX);
    });

    rightSplitterEl.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      beginResize('right', e.clientX);
    });

    window.addEventListener('mousemove', (e) => onResizeMove(e.clientX));
    window.addEventListener('mouseup', () => endResize());
    window.addEventListener('blur', () => endResize());

    updateLeftPanelActions();
    boot();
  </script>
</body>
</html>
